<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users | SQL Migrator</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/tables.css" />
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="page-content">
    <header class="page-header">
      <div class="header-content">
        <h1>SQL Migrator</h1>
        <p>Database Migration & Management Platform</p>
      </div>
    </header>
    <main class="content-inner">
      <section class="dashboard-summary" id="users-metrics"></section>
      <section class="card">
        <div class="header-bar">
          <h2>User Management</h2>
        </div>
        <div class="table-wrapper">
          <table class="table-block" aria-label="Users table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Total Migrations</th>
                <th>Last Login</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/users.js"></script>
  <script>initUsersPage();</script>
</body>
</html>
