<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports | SQL Migrator</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/reports.css" />
  <link rel="stylesheet" href="../css/tables.css" />
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="page-content">
    <header class="page-header">
      <div class="header-content">
        <h1>SQL Migrator</h1>
        <p>Database Migration & Management Platform</p>
      </div>
    </header>
    <main class="content-inner">
      <section class="report-grid" id="report-summary"></section>
      <section class="card">
        <div class="header-bar">
          <h2>Reports</h2>
        </div>
        <div class="report-actions">
          <button class="button-primary">Create New Report</button>
          <button class="button-secondary">Refresh</button>
        </div>
        <div class="table-wrapper" style="margin-top:20px;">
          <table class="table-block" aria-label="Reports table">
            <thead>
              <tr><th>Report Name</th><th>Type</th><th>Generated By</th><th>Date</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="reports-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/reports.js"></script>
  <script>initReportsPage();</script>
</body>
</html>
