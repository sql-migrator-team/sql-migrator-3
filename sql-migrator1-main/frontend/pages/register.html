<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | SQL Migrator</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body class="auth-shell">
  <main class="auth-card" role="main">
    <h1>Create Account</h1>
    <p>Register for secure access to the SQL Migrator platform.</p>
    <div id="auth-message"></div>
    <form id="register-form" class="form-grid" aria-label="Registration form">
      <div class="input-group">
        <label for="fullname">Full Name</label>
        <input id="fullname" name="fullname" type="text" placeholder="Jane Doe" required />
      </div>
      <div class="input-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required />
      </div>
      <div class="input-group">
        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" name="confirmPassword" type="password" placeholder="••••••••" required />
      </div>
      <fieldset class="radio-group" aria-label="Select role">
        <label><input type="radio" name="role" value="User" checked /> User</label>
        <label><input type="radio" name="role" value="Admin" /> Admin</label>
      </fieldset>
      <button type="submit" class="button-primary">Register</button>
    </form>
    <div class="auth-footer">
      <a href="login.html">Back to Login</a>
      <p class="auth-note">Registration is available for users and admins.</p>
    </div>
  </main>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script>initAuthPage();</script>
</body>
</html>
