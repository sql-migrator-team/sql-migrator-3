<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | SQL Migrator</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body class="auth-shell">
  <main class="auth-card" role="main">
    <h1>Reset Password</h1>
    <p>Enter your email and we'll send a password reset link.</p>
    <div id="auth-message"></div>
    <form id="forgot-form" class="form-grid" aria-label="Forgot password form">
      <div class="input-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />
      </div>
      <button type="submit" class="button-primary">Send Reset Link</button>
    </form>
    <div class="auth-footer">
      <a href="login.html">Back to Login</a>
      <p class="auth-note">A reset link will be sent to your email.</p>
    </div>
  </main>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script>initAuthPage();</script>
</body>
</html>
